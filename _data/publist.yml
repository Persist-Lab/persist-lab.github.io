- title: "A Review of Cognitive Assistants for Healthcare: Trends, Prospects, and Future Directions"
  image: CognitiveAssistants.png
  description: Healthcare cognitive assistants (HCAs) are intelligent systems or agents that interact with users in a contextaware and adaptive manner to improve their health outcomes by augmenting their cognitive abilities or complementing a cognitive impairment. 
  authors: SARAH MASUD PREUM, SIRAJUM MUNIR, MEIYI MA, MOHAMMAD SAMIN YASAR, DAVID J. STONE, RONALD WILLIAMS and HOMA ALEMZADEH, JOHN A. STANKOVIC
  link:
    url: https://homa-alem.github.io/papers/CognitiveAssistants2021.pdf
    display: ACM Computing Surveys (CSUR) 53 (6), 1-37
  highlight: 1
  news1:
  


- title: "Technical Feasibility, Financial Viability, and Clinician Acceptance: On the many challenges to AI in Clinical Practice"
  image: Pairs3.png
  description: Artificial intelligence (AI) applications in healthcare offer the promise of improved decision making for clinicians, and better healthcare outcomes for patients. We encourage the research community to take on these lenses in collaboratively tackling the challenges of moving AI systems into real-world healthcare applications.
  authors: Nur Yildirim, John Zimmerman, Sarah Preum
  link:
    url: https://www.researchgate.net/profile/Nur-Yildirim/publication/355964953_Technical_Feasibility_Financial_Viability_and_Clinician_Acceptance_On_the_many_challenges_to_AI_in_Clinical_Practice/links/618680ad61f0987720648573/Technical-Feasibility-Financial-Viability-and-Clinician-Acceptance-On-the-many-challenges-to-AI-in-Clinical-Practice.pdf
